version: '3.8'

services:
  # FastAPI 后端
  backend:
    build: ./backend
    container_name: selfmedia-backend
    ports:
      - "8000:8000"
    environment:
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - MINIMAX_BASE_URL=${MINIMAX_BASE_URL:-https://api.minimaxi.com/v1}
      - MINIMAX_MODEL=${MINIMAX_MODEL:-MiniMax-M3}
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # Vue 前端
  frontend:
    build: ./frontend
    container_name: selfmedia-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend
    restart: unless-stopped

  # PostgreSQL (P1 - 用户认证/数据库持久化)
  postgres:
    image: postgres:15-alpine
    container_name: selfmedia-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: selfmedia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Redis (P1 - 任务调度)
  redis:
    image: redis:7-alpine
    container_name: selfmedia-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # MinIO (P1 - 对象存储)
  minio:
    image: minio/minio:latest
    container_name: selfmedia-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
